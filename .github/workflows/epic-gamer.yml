name: Epic Awesome Gamer (Scheduled AiHubMix)

on:
  workflow_dispatch: # 手动触发
  schedule:
    # 每天 UTC 08:00 (北京时间 16:00) 运行一次
    # - cron: '0 8 * * *'
    # 每周五 07:00（北京时间 UTC+8）= 每周四 23:00（UTC）
    # 避开周四刚刷新高峰：周五中午（北京时间）跑一次 北京时间 周五 11:30
    - cron: '30 3 * * 5'
    # 兜底：周一中午（北京时间）再跑一次
    - cron: '30 3 * * 1'

jobs:
  epic-gamer:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxml2-dev libxslt-dev

      - name: Install dependencies
        run: uv sync

      # 增加 GITHUB_TOKEN 以解决 Camoufox 下载时的 403 频率限制
      - name: Install Camoufox
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run camoufox fetch

      - name: Run Epic Awesome Gamer
        env:
          EPIC_EMAIL: ${{ secrets.EPIC_EMAIL }}
          EPIC_PASSWORD: ${{ secrets.EPIC_PASSWORD }}
          API_KEY: ${{ secrets.API_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          # GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # GEMINI_BASE_URL: ${{ secrets.GEMINI_BASE_URL }}
          # GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          # 在 Actions 中我们依靠 GitHub 的 cron 触发，所以关闭内部调度器
          ENABLE_APSCHEDULER: false
          PYTHONPATH: app
        run: |
          echo "🚀 启动定时领取任务（已适配 AiHubMix 中转）..."
          xvfb-run --auto-servernum --server-num=1 --server-args='-screen 0, 1920x1080x24' uv run app/deploy.py
